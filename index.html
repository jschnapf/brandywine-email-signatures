  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 (body serif) ---- */\n@font-face {\n  font-family: \"Bitter\";\n  src: url(\"fb36160b-d44c-4965-9444-3faa0b51a463\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Bitter\";\n  src: url(\"75e78767-c78c-4998-bfea-2fd1db5cb3c4\") format(\"truetype\");\n  font-weight: 400;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Bitter\";\n  src: url(\"1df9fc06-916a-4b17-bfed-d6907ad2df5a\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Brandywine — Color tokens\n   Source: Brand Styleguide + Moodboard color palette.\n   Five brand colors anchor the system. Each of the three\n   sub-brands owns one accent; Brown is the parent institution.\n   ============================================================ */\n:root {\n  /* ---------- Brand core (exact spec values) ---------- */\n  --bw-brown:      #735744; /* Brandywine Brown · parent institution · rgb 115 87 68  */\n  --bw-evergreen:  #1E8773; /* Evergreen · Conservancy            · rgb 30 135 115 */\n  --bw-pumpkin:    #FF9628; /* Pumpkin · Museum of Art            · rgb 255 150 40 */\n  --bw-charcoal:   #4E4E57; /* Charcoal · primary text / logotype · rgb 78 78 87   */\n  --bw-stone:      #838389; /* Stone gray · secondary             · rgb 131 131 137 */\n\n  /* ---------- Brown ramp (parent / warm) ---------- */\n  --brown-900: #3F2F23;\n  --brown-700: #5A4433;\n  --brown-600: #735744; /* base */\n  --brown-400: #9C8472;\n  --brown-200: #CDBFB3;\n  --brown-100: #E7DED6;\n  --brown-50:  #F5F0EB;\n\n  /* ---------- Evergreen ramp (Conservancy / cool) ---------- */\n  --green-900: #0E4338;\n  --green-700: #166B5B;\n  --green-600: #1E8773; /* base */\n  --green-400: #57AC9C;\n  --green-200: #ABD5CC;\n  --green-100: #D6EAE5;\n  --green-50:  #ECF5F2;\n\n  /* ---------- Pumpkin ramp (Museum / energetic) ---------- */\n  --pumpkin-900: #B85E00;\n  --pumpkin-700: #E07A12;\n  --pumpkin-600: #FF9628; /* base */\n  --pumpkin-400: #FFB463;\n  --pumpkin-200: #FFD9AC;\n  --pumpkin-100: #FFEAD2;\n  --pumpkin-50:  #FFF5EA;\n\n  /* ---------- Neutrals (charcoal-warmed grays) ---------- */\n  --ink-900: #2A2A30;\n  --ink-800: #3A3A42;\n  --ink-700: #4E4E57; /* charcoal base */\n  --ink-600: #63636B;\n  --ink-500: #838389; /* stone base */\n  --ink-400: #A3A3A8;\n  --ink-300: #C6C6CA;\n  --ink-200: #E0E0E2;\n  --ink-100: #EEEEEF;\n  --paper:   #FAF8F5; /* warm off-white page */\n  --paper-pure: #FFFFFF;\n\n  /* ---------- Semantic aliases ---------- */\n  --color-accent:           var(--bw-brown);     /* default = parent brand */\n  --color-accent-hover:     var(--brown-700);\n  --color-accent-contrast:  #FFFFFF;\n\n  --text-strong:   var(--ink-900);\n  --text-body:     var(--ink-800);\n  --text-muted:    var(--ink-500);\n  --text-inverse:  #FFFFFF;\n  --text-link:     var(--bw-evergreen);\n\n  --surface-page:   var(--paper);\n  --surface-card:   var(--paper-pure);\n  --surface-sunken: var(--brown-50);\n  --surface-inverse: var(--ink-900);\n\n  --border-subtle:  var(--ink-200);\n  --border-default: var(--ink-300);\n  --border-strong:  var(--ink-700);\n\n  /* ---------- Status ---------- */\n  --color-success: #1E8773;\n  --color-warning: #E07A12;\n  --color-danger:  #B23A2E;\n  --color-info:    #3A6B8A;\n\n  /* ---------- Sub-brand theme hooks ----------\n     Apply [data-brand=\"conservancy\"|\"museum\"|\"institution\"]\n     on any container to retune the accent locally. */\n}\n\n[data-brand=\"institution\"] {\n  --color-accent:        var(--bw-brown);\n  --color-accent-hover:  var(--brown-700);\n  --surface-sunken:      var(--brown-50);\n}\n[data-brand=\"conservancy\"] {\n  --color-accent:        var(--bw-evergreen);\n  --color-accent-hover:  var(--green-700);\n  --surface-sunken:      var(--green-50);\n  --text-link:           var(--green-700);\n}\n[data-brand=\"museum\"] {\n  --color-accent:        var(--bw-pumpkin);\n  --color-accent-hover:  var(--pumpkin-700);\n  --color-accent-contrast: var(--ink-900);\n  --surface-sunken:      var(--pumpkin-50);\n  --text-link:           var(--pumpkin-900);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Brandywine — Typography tokens\n   Display / UI : Trade Gothic LT Std (uppercase, tracked)\n   Body / editorial : Bitter (slab serif)\n   Non-designer fallbacks per styleguide: Calibri, Georgia.\n   ============================================================ */\n:root {\n  /* ---------- Families ---------- */\n  --font-display: \"Trade Gothic LT Std\", \"Calibri\", \"Arial Narrow\", system-ui, sans-serif;\n  --font-cond:    \"Trade Gothic LT Std Cn\", \"Trade Gothic LT Std\", \"Arial Narrow\", sans-serif;\n  --font-body:    \"Bitter\", \"Georgia\", \"Times New Roman\", serif;\n  --font-ui:      \"Trade Gothic LT Std\", \"Calibri\", system-ui, sans-serif;\n\n  /* ---------- Weights ---------- */\n  --fw-light:    300; /* @kind font */\n  --fw-regular:  400; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-black:    800; /* @kind font */ /* Trade Gothic Bold No. 2 */\n\n  /* ---------- Type scale (1.250 major-third on a 16px base) ---------- */\n  --fs-2xs:  0.6875rem; /* 11px — eyebrows, captions */\n  --fs-xs:   0.75rem;   /* 12px */\n  --fs-sm:   0.875rem;  /* 14px */\n  --fs-base: 1rem;      /* 16px — body */\n  --fs-md:   1.125rem;  /* 18px — lead body */\n  --fs-lg:   1.375rem;  /* 22px */\n  --fs-xl:   1.75rem;   /* 28px */\n  --fs-2xl:  2.25rem;   /* 36px */\n  --fs-3xl:  3rem;      /* 48px */\n  --fs-4xl:  4rem;      /* 64px — display */\n  --fs-5xl:  5.25rem;   /* 84px — hero */\n\n  /* ---------- Line heights ---------- */\n  --lh-tight:   1.05;  /* @kind other */\n  --lh-snug:    1.18;  /* @kind other */\n  --lh-normal:  1.45;  /* @kind other */\n  --lh-relaxed: 1.65;  /* @kind other */\n\n  /* ---------- Tracking ---------- */\n  --ls-display: 0.01em; /* @kind other */\n  --ls-eyebrow: 0.18em; /* @kind other */ /* tracked-out uppercase labels */\n  --ls-caps:    0.06em; /* @kind other */\n  --ls-body:    0;       /* @kind other */\n\n  /* ---------- Semantic roles ---------- */\n  --text-hero-font:    var(--font-display);\n  --text-hero-weight:  var(--fw-black);\n  --text-heading-font: var(--font-display);\n  --text-body-font:    var(--font-body);\n  --text-eyebrow-font: var(--font-display);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Brandywine — Spacing, radii, borders, shadows, motion\n   8px soft-grid. The brand reads architectural and grounded:\n   modest radii, hairline borders, low-spread shadows.\n   ============================================================ */\n:root {\n  /* ---------- Spacing (8px grid, with 4px half-steps) ---------- */\n  --space-0:   0;\n  --space-1:   0.25rem;  /* 4  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   3rem;     /* 48 */\n  --space-8:   4rem;     /* 64 */\n  --space-9:   6rem;     /* 96 */\n  --space-10:  8rem;     /* 128 */\n\n  /* ---------- Radii (restrained — square millstone heritage) ---------- */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-pill: 999px;\n\n  /* ---------- Borders ---------- */\n  --border-hairline: 1px;\n  --border-thick:    2px;\n  --border-rule:     3px;  /* accent rule under eyebrows / headings */\n\n  /* ---------- Shadows (cool, low, diffuse — never heavy) ---------- */\n  --shadow-xs: 0 1px 2px rgba(42, 42, 48, 0.06);\n  --shadow-sm: 0 1px 3px rgba(42, 42, 48, 0.08), 0 1px 2px rgba(42, 42, 48, 0.04);\n  --shadow-md: 0 4px 12px rgba(42, 42, 48, 0.08), 0 2px 4px rgba(42, 42, 48, 0.04);\n  --shadow-lg: 0 12px 28px rgba(42, 42, 48, 0.12), 0 4px 8px rgba(42, 42, 48, 0.05);\n  --shadow-focus: 0 0 0 3px rgba(30, 135, 115, 0.35);\n\n  /* ---------- Layout ---------- */\n  --container-narrow: 42rem;   /* 672 — editorial reading width */\n  --container-text:   58rem;   /* 928 */\n  --container-wide:   75rem;   /* 1200 */\n  --gutter:           var(--space-5);\n\n  /* ---------- Motion (calm, no bounce) ---------- */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);     /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Brandywine — Base element styles & a few brand utilities.\n   Tokens must load before this (handled by styles.css order).\n   ============================================================ */\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--fs-base);\n  line-height: var(--lh-relaxed);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-display);\n  margin: 0 0 var(--space-4);\n  font-weight: var(--fw-bold);\n}\nh1 { font-size: var(--fs-3xl); font-weight: var(--fw-black); line-height: var(--lh-tight); }\nh2 { font-size: var(--fs-2xl); }\nh3 { font-size: var(--fs-xl); }\nh4 { font-size: var(--fs-lg); }\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; text-underline-offset: 2px; }\n\nstrong { font-weight: var(--fw-bold); }\n\n::selection { background: var(--green-200); color: var(--ink-900); }\n\n/* ---- Eyebrow: the signature tracked-out uppercase label ---- */\n.bw-eyebrow {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-2xs);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--color-accent);\n  display: inline-block;\n}\n\n/* ---- Accent rule used beneath headings / eyebrows ---- */\n.bw-rule {\n  width: var(--space-7);\n  height: var(--border-rule);\n  background: var(--color-accent);\n  border: 0;\n  margin: var(--space-3) 0;\n}\n\n/* ---- Display heading helper (hero scale, uppercase) ---- */\n.bw-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-black);\n  font-size: var(--fs-4xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-display);\n  text-transform: uppercase;\n  color: var(--text-strong);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Brandywine Design System — global entry point.\n   Consumers link THIS file. Import order matters: fonts &\n   tokens first, base element styles last.\n   ============================================================ */\n/* ============================================================\n   Brandywine — Webfonts\n   Display: Trade Gothic LT Std  ·  Body: Bitter\n   Provided by the brand (licensed). Fallbacks documented in\n   typography.css for environments without the webfonts.\n   ============================================================ */\n\n/* ---- Trade Gothic LT Std (display / UI) ---- */\n@font-face {\n  font-family: \"Trade Gothic LT Std\";\n  src: url(\"4db4a6f5-614b-46db-8dff-e133e45b0109\") format(\"opentype\");\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Trade Gothic LT Std\";\n  src: url(\"46a171a8-7ec0-43d4-a22c-2b35183d6100\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Trade Gothic LT Std\";\n  src: url(\"f55543d4-7f1b-4c31-88ee-213b8167f98d\") format(\"open    · rgb 30 135 115 */\n  --bw-pumpkin:    #FF9628; /* Pumpkin · Museum of Art            · rgb 255 150 40 */\n  --bw-charcoal:   #4E4E57; /* Charcoal · primary text / logotype · rgb 78 78 87   */\n  --bw-stone:      #838389; /* Stone gray · secondary             · rgb 131 131 137 */\n\n  /* ---------- Brown ramp (parent / warm) ---------- */\n  --brown-900: #3F2F23;\n  --brown-700: #5A4433;\n  --brown-600: #735744; /* base */\n  --brown-400: #9C8472;\n  --brown-200: #CDBFB3;\n  --brown-100: #E7DED6;\n  --brown-50:  #F5F0EB;\n\n  /* ---------- Evergreen ramp (Conservancy / cool) ---------- */\n  --green-900: #0E4338;\n  --green-700: #166B5B;\n  --green-600: #1E8773; /* base */\n  --green-400: #57AC9C;\n  --green-200: #ABD5CC;\n  --green-100: #D6EAE5;\n  --green-50:  #ECF5F2;\n\n  /* ---------- Pumpkin ramp (Museum / energetic) ---------- */\n  --pumpkin-900: #B85E00;\n  --pumpkin-700: #E07A12;\n  --pumpkin-600: #FF9628; /* base */\n  --pumpkin-400: #FFB463;\n  --pumpkin-200: #FFD9AC;\n  --pumpkin-100: #FFEAD2;\n  --pumpkin-50:  #FFF5EA;\n\n  /* ---------- Neutrals (charcoal-warmed grays) ---------- */\n  --ink-900: #2A2A30;\n  --ink-800: #3A3A42;\n  --ink-700: #4E4E57; /* charcoal base */\n  --ink-600: #63636B;\n  --ink-500: #838389; /* stone base */\n  --ink-400: #A3A3A8;\n  --ink-300: #C6C6CA;\n  --ink-200: #E0E0E2;\n  --ink-100: #EEEEEF;\n  --paper:   #FAF8F5; /* warm off-white page */\n  --paper-pure: #FFFFFF;\n\n  /* ---------- Semantic aliases ---------- */\n  --color-accent:           var(--bw-brown);     /* default = parent brand */\n  --color-accent-hover:     var(--brown-700);\n  --color-accent-contrast:  #FFFFFF;\n\n  --text-strong:   var(--ink-900);\n  --text-body:     var(--ink-800);\n  --text-muted:    var(--ink-500);\n  --text-inverse:  #FFFFFF;\n  --text-link:     var(--bw-evergreen);\n\n  --surface-page:   var(--paper);\n  --surface-card:   var(--paper-pure);\n  --surface-sunken: var(--brown-50);\n  --surface-inverse: var(--ink-900);\n\n  --border-subtle:  var(--ink-200);\n  --border-default: var(--ink-300);\n  --border-strong:  var(--ink-700);\n\n  /* ---------- Status ---------- */\n  --color-success: #1E8773;\n  --color-warning: #E07A12;\n  --color-danger:  #B23A2E;\n  --color-info:    #3A6B8A;\n\n  /* ---------- Sub-brand theme hooks ----------\n     Apply [data-brand=\"conservancy\"|\"museum\"|\"institution\"]\n     on any container to retune the accent locally. */\n}\n\n[data-brand=\"institution\"] {\n  --color-accent:        var(--bw-brown);\n  --color-accent-hover:  var(--brown-700);\n  --surface-sunken:      var(--brown-50);\n}\n[data-brand=\"conservancy\"] {\n  --color-accent:        var(--bw-evergreen);\n  --color-accent-hover:  var(--green-700);\n  --surface-sunken:      var(--green-50);\n  --text-link:           var(--green-700);\n}\n[data-brand=\"museum\"] {\n  --color-accent:        var(--bw-pumpkin);\n  --color-accent-hover:  var(--pumpkin-700);\n  --color-accent-contrast: var(--ink-900);\n  --surface-sunken:      var(--pumpkin-50);\n  --text-link:           var(--pumpkin-900);\n}\n\n/* ============================================================\n   Brandywine — Typography tokens\n   Display / UI : Trade Gothic LT Std (uppercase, tracked)\n   Body / editorial : Bitter (slab serif)\n   Non-designer fallbacks per styleguide: Calibri, Georgia.\n   ============================================================ */\n:root {\n  /* ---------- Families ---------- */\n  --font-display: \"Trade Gothic LT Std\", \"Calibri\", \"Arial Narrow\", system-ui, sans-serif;\n  --font-cond:    \"Trade Gothic LT Std Cn\", \"Trade Gothic LT Std\", \"Arial Narrow\", sans-serif;\n  --font-body:    \"Bitter\", \"Georgia\", \"Times New Roman\", serif;\n  --font-ui:      \"Trade Gothic LT Std\", \"Calibri\", system-ui, sans-serif;\n\n  /* ---------- Weights ---------- */\n  --fw-light:    300; /* @kind font */\n  --fw-regular:  400; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-black:    800; /* @kind font */ /* Trade Gothic Bold No. 2 */\n\n  /* ---------- Type scale (1.250 major-third on a 16px base) ---------- */\n  --fs-2xs:  0.6875rem; /* 11px — eyebrows, captions */\n  --fs-xs:   0.75rem;   /* 12px */\n  --fs-sm:   0.875rem;  /* 14px */\n  --fs-base: 1rem;      /* 16px — body */\n  --fs-md:   1.125rem;  /* 18px — lead body */\n  --fs-lg:   1.375rem;  /* 22px */\n  --fs-xl:   1.75rem;   /* 28px */\n  --fs-2xl:  2.25rem;   /* 36px */\n  --fs-3xl:  3rem;      /* 48px */\n  --fs-4xl:  4rem;      /* 64px — display */\n  --fs-5xl:  5.25rem;   /* 84px — hero */\n\n  /* ---------- Line heights ---------- */\n  --lh-tight:   1.05;  /* @kind other */\n  --lh-snug:    1.18;  /* @kind other */\n  --lh-normal:  1.45;  /* @kind other */\n  --lh-relaxed: 1.65;  /* @kind other */\n\n  /* ---------- Tracking ---------- */\n  --ls-display: 0.01em; /* @kind other */\n  --ls-eyebrow: 0.18em; /* @kind other */ /* tracked-out uppercase labels */\n  --ls-caps:    0.06em; /* @kind other */\n  --ls-body:    0;       /* @kind other */\n\n  /* ---------- Semantic roles ---------- */\n  --text-hero-font:    var(--font-display);\n  --text-hero-weight:  var(--fw-black);\n  --text-heading-font: var(--font-display);\n  --text-body-font:    var(--font-body);\n  --text-eyebrow-font: var(--font-display);\n}\n\n/* ============================================================\n   Brandywine — Spacing, radii, borders, shadows, motion\n   8px soft-grid. The brand reads architectural and grounded:\n   modest radii, hairline borders, low-spread shadows.\n   ============================================================ */\n:root {\n  /* ---------- Spacing (8px grid, with 4px half-steps) ---------- */\n  --space-0:   0;\n  --space-1:   0.25rem;  /* 4  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   3rem;     /* 48 */\n  --space-8:   4rem;     /* 64 */\n  --space-9:   6rem;     /* 96 */\n  --space-10:  8rem;     /* 128 */\n\n  /* ---------- Radii (restrained — square millstone heritage) ---------- */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-pill: 999px;\n\n  /* ---------- Borders ---------- */\n  --border-hairline: 1px;\n  --border-thick:    2px;\n  --border-rule:     3px;  /* accent rule under eyebrows / headings */\n\n  /* ---------- Shadows (cool, low, diffuse — never heavy) ---------- */\n  --shadow-xs: 0 1px 2px rgba(42, 42, 48, 0.06);\n  --shadow-sm: 0 1px 3px rgba(42, 42, 48, 0.08), 0 1px 2px rgba(42, 42, 48, 0.04);\n  --shadow-md: 0 4px 12px rgba(42, 42, 48, 0.08), 0 2px 4px rgba(42, 42, 48, 0.04);\n  --shadow-lg: 0 12px 28px rgba(42, 42, 48, 0.12), 0 4px 8px rgba(42, 42, 48, 0.05);\n  --shadow-focus: 0 0 0 3px rgba(30, 135, 115, 0.35);\n\n  /* ---------- Layout ---------- */\n  --container-narrow: 42rem;   /* 672 — editorial reading width */\n  --container-text:   58rem;   /* 928 */\n  --container-wide:   75rem;   /* 1200 */\n  --gutter:           var(--space-5);\n\n  /* ---------- Motion (calm, no bounce) ---------- */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);     /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n}\n\n/* ============================================================\n   Brandywine — Base element styles & a few brand utilities.\n   Tokens must load before this (handled by styles.css order).\n   ============================================================ */\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--fs-base);\n  line-height: var(--lh-relaxed);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-display);\n  margin: 0 0 var(--space-4);\n  font-weight: var(--fw-bold);\n}\nh1 { font-size: var(--fs-3xl); font-weight: var(--fw-black); line-height: var(--lh-tight); }\nh2 { font-size: var(--fs-2xl); }\nh3 { font-size: var(--fs-xl); }\nh4 { font-size: var(--fs-lg); }\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; text-underline-offset: 2px; }\n\nstrong { font-weight: var(--fw-bold); }\n\n::selection { background: var(--green-200); color: var(--ink-900); }\n\n/* ---- Eyebrow: the signature tracked-out uppercase label ---- */\n.bw-eyebrow {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-2xs);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--color-accent);\n  display: inline-block;\n}\n\n/* ---- Accent rule used beneath headings / eyebrows ---- */\n.bw-rule {\n  width: var(--space-7);\n  height: var(--border-rule);\n  background: var(--color-accent);\n  border: 0;\n  margin: var(--space-3) 0;\n}\n\n/* ---- Display heading helper (hero scale, uppercase) ---- */\n.bw-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-black);\n  font-size: var(--fs-4xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-display);\n  text-transform: uppercase;\n  color: var(--text-strong);\n}\n\n<\u002Fstyle>\n  <script src=\"9a1b2ecf-36b8-4c3f-b842-fab9a662ea34\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: var(--paper, #FAF8F5); }\n    a { color: var(--color-accent, #735744); }\n    a:hover { color: var(--charcoal, #4E4E57); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height: 100vh; padding: 64px 24px 96px 24px; display: flex; justify-content: center;\">\n  <div style=\"width: 100%; max-width: 720px; display: flex; 't work in your browser, click into a signature, select it all, and copy manually. The signature itself is set entirely in Arial for consistent rendering across email clients.<\u002Fp>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;showJobTitle&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Signature lines&quot;},\n  &quot;showWebsite&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Signature lines&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { copied: null };\n\n  copy(key) {\n    const el = document.getElementById('sig-' + key);\n    if (!el) return;\n    const done = () => {\n      this.setState({ copied: key });\n      clearTimeout(this._t);\n      this._t = setTimeout(() => this.setState({ copied: null }), 2500);\n    };\n    const fallback = () => {\n      const range = document.createRange();\n      range.selectNodeContents(el);\n      const sel = window.getSelection();\n      sel.removeAllRanges();\n      sel.addRange(range);\n      try { document.execCommand('copy'); done(); } catch (e) {}\n      sel.removeAllRanges();\n    };\n    if (navigator.clipboard && window.ClipboardItem) {\n      navigator.clipboard.write([new ClipboardItem({\n        'text/html': new Blob([el.innerHTML], { type: 'text/html' }),\n        'text/plain': new Blob([el.innerText], { type: 'text/plain' })\n      })]).then(done).catch(fallback);\n    } else {\n      fallback();\n    }\n  }\n\n  renderVals() {\n    return {\n      showJobTitle: this.props.showJobTitle ?? true,\n      showWebsite: this.props.showWebsite ?? true,\n      copiedParent: this.state.copied === 'parent',\n      copiedConservancy: this.state.copied === 'conservancy',\n      copiedMuseum: this.state.copied === 'museum',\n      copyParent: () =>
